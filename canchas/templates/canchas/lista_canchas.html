{% extends 'base.html' %}

{% block title %}Lista de Canchas{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="text-center mb-4">Lista de Canchas</h1>
    <div class="row">
        {% for cancha in canchas %}
            <div class="col-md-4">
                <div class="card mb-3">
                    <img src="{{ cancha.imagen.url }}" class="card-img-top" alt="Imagen de {{ cancha.nombre }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ cancha.nombre }}</h5>
                        <p class="card-text"><strong>Dirección:</strong> {{ cancha.direccion }}</p>
                        <p class="card-text"><strong>Capacidad:</strong> {{ cancha.capacidad }} personas</p>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
