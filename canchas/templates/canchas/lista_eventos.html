<!DOCTYPE html>
<html>
<head>
    <title>Lista de Eventos</title>
</head>
<body>
    <h1>Lista de Eventos</h1>
    <ul>
        {% for evento in eventos %}
            <li>
                <a href="{% url 'detalle_evento' evento.id %}">
                    {{ evento.titulo }} en {{ evento.cancha.nombre }} - {{ evento.fecha_inicio|date:"d M Y H:i" }}
                </a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
