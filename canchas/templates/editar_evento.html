{% extends 'base.html' %}

{% block title %}
Editar Evento: {{ evento.titulo }}
{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center text-primary">Editar Evento</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mt-3">
            <button type="submit" class="btn btn-success">Guardar Cambios</button>
            <a href="{% url 'detalle_evento' evento.id %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
