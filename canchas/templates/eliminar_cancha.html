{% extends 'base.html' %}

{% block title %}Eliminar Cancha{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-4">Eliminar Cancha</h1>
    <p>¿Estás seguro de que deseas eliminar la cancha <strong>{{ cancha.nombre }}</strong>?</p>
    <p>Esta acción no se puede deshacer.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="{% url 'mis_canchas' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
